<div class="configurator">

<script>
  // --- Telegram WebApp инициализация ---
  const tg = window.Telegram.WebApp;
  tg.expand();  // растянуть на весь экран
  // Применить цвета темы Telegram (опционально)
  const setTheme = () => {
    const bg = tg.themeParams.bg_color || '#f6f5ec';
    const text = tg.themeParams.text_color || '#2b2a28';
    document.body.style.backgroundColor = bg;
    document.body.style.color = text;
  };
  setTheme();

  // ---- Ваш существующий объект models (без изменений) ----
  const models = { ... };  // скопируйте сюда ваш объект models целиком

  let currentModel = null;

  function formatNumber(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
  }

  function selectModel(key) { /* без изменений */ }
  function renderPreview() { /* без изменений */ }
  function renderOptions() {
    // ... ваш код ...
    // В конце добавьте настройку главной кнопки
    if (currentModel) {
      tg.MainButton.setText("Оформить заказ");
      tg.MainButton.onClick(() => sendOrder());
      tg.MainButton.show();
    }
  }
  function updateTotal() { /* без изменений */ }

  // --- Новая функция отправки заказа ---
  function sendOrder() {
    if (!currentModel) return;
    
    const selectedOptions = [];
    document.querySelectorAll('.option input[type="checkbox"]:checked').forEach(ch => {
      const optDiv = ch.closest('.option');
      const name = optDiv.querySelector('.name')?.innerText || 'Опция';
      const price = parseInt(ch.value, 10);
      selectedOptions.push({ name, price });
    });

    const total = currentModel.basePrice + selectedOptions.reduce((s, opt) => s + opt.price, 0);
    const orderData = {
      model: currentModel.name,
      base_price: currentModel.basePrice,
      selected_options: selectedOptions,
      total_price: total,
      timestamp: new Date().toISOString()
    };

    tg.sendData(JSON.stringify(orderData));
    tg.MainButton.setText("Отправлено ✓");
    tg.MainButton.disable();
    setTimeout(() => tg.close(), 1500);
  }

  // --- Слайдер и события мыши/тач (оставьте как есть) ---

</script>
